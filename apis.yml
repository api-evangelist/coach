description: >-
  Coach is a luxury leather goods and lifestyle brand offering handbags,
  accessories, footwear, ready-to-wear apparel, and fragrances. Coach is owned
  by Tapestry, Inc. (NYSE: TPR), the New York-based house of accessible luxury
  brands that also operates Kate Spade New York and Stuart Weitzman. Coach
  operates direct-to-consumer e-commerce at coach.com and a global network of
  retail and outlet stores. Coach does not publish a public-facing developer
  portal or API; integrations with retail partners, marketplaces, and ad tech
  platforms run through Tapestry's enterprise systems and approved partner
  channels rather than a self-service developer program.
